<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHCHK Product</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-100 font-sans">

<!-- HEADER -->

<header class="flex justify-between items-center px-10 py-5 border-b bg-white text-sm">

<div class="flex gap-8 font-semibold">
<span class="cursor-pointer">☰ Menu</span>
<span class="cursor-pointer">← Go Back</span>
</div>

<h1 class="text-xl font-bold tracking-[0.3em]">SHCHK™</h1>

<div class="flex gap-8 font-semibold">
<span class="cursor-pointer">🖤 Wishlist</span>
<span class="cursor-pointer">🛒 Cart</span>
</div>

</header>


<!-- PRODUCT SECTION -->

<section class="max-w-7xl mx-auto grid grid-cols-3 min-h-screen bg-white shadow-lg">

<!-- LEFT SIDE -->

<div class="p-12 border-r flex flex-col justify-center space-y-6">

<h2 class="text-4xl font-bold leading-tight">
Flounce Off-the-Shoulder Crop Top <br>
<span class="text-gray-500 text-xl">by SHCHK</span>
</h2>

<div class="flex gap-4 text-lg">
<span class="font-bold text-black">$22.00</span>
<span class="line-through text-gray-400">$44.00</span>
</div>

<div>

<h3 class="text-xs tracking-widest font-semibold mb-2">
DETAILS
</h3>

<p class="text-gray-600 text-sm leading-relaxed max-w-md">
A knit top featuring an elasticized off-the-shoulder neckline,
short sleeves, a flounce layer, elasticized hem,
and a cropped silhouette.
</p>

</div>

<img
src="https://i.pinimg.com/1200x/20/8e/89/208e89e919406828d51031c00d211eea.jpg"
class="w-72 rounded-lg shadow mt-6"
>

</div>


<!-- CENTER IMAGE -->

<div class="border-r flex items-center justify-center bg-gray-50">

<img
src="https://i.pinimg.com/1200x/8d/be/ab/8dbeab4f6216fff12889f550e989c3b2.jpg"
class="h-[650px] object-cover rounded-md"
/>

</div>


<!-- RIGHT SIDE -->

<div class="p-12 flex flex-col justify-center space-y-8">

<!-- SIZE -->

<div class="flex gap-4">

<button class="border rounded-full w-10 h-10 hover:bg-black hover:text-white transition">
S
</button>

<button class="border rounded-full w-10 h-10 bg-black text-white">
M
</button>

<button class="border rounded-full w-10 h-10 hover:bg-black hover:text-white transition">
L
</button>

<button class="border rounded-full w-10 h-10 hover:bg-black hover:text-white transition">
XL
</button>

</div>


<!-- ADD TO CART -->

<button class="bg-black text-white py-3 w-64 flex items-center justify-center gap-2 hover:bg-gray-800 transition">

<span class="text-xl">+</span>
ADD TO CART

</button>


<!-- WISHLIST -->

<button class="border py-3 w-64 flex items-center justify-center gap-2 hover:bg-gray-100 transition">

♡ ADD TO WISHLIST

</button>




</body>
</html>
