<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SHCHK Product</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="font-bold bg-gray-100">

<header class="flex justify-between items-center px-10 py-4 border-b text-sm">

<div class="font-bold flex gap-8">
<span>☰ Menu</span>
<span>← Go Back</span>
</div>

<h1 class="font-bold tracking-widest">SHCHK™</h1>

<div class="font-bold flex gap-8">
<span>🖤 Wishlist</span>
<span>🛒 Cart</span>
</div>
</header>

<section class="max-w-7xl grid grid-cols-3 min-h-screen">

<div class="p-12 border-r border-gray-300 flex flex-col justify-center space-y-6">

<h2 class="text-4xl leading-tight">
Flounce Off-the-Shoulder Crop Topby SHCHK
</h2>

<div class="flex gap-4 text-lg">
<span class="font-bold">$22.00</span>
<span class="line-through text-gray-400">$44.00</span>
</div>
<div>
<h3 class="text-sm tracking-widest mb-2">DETAILS</h3>

<p class="text-gray-600 text-sm leading-relaxed">
A knit top featuring an elasticized off the shoulder neckline,
short sleeves, a flounce layer, elasticized hem,
and a cropped silhouette.
</p>
</div>

<img
src="https://i.pinimg.com/736x/42/c5/cc/42c5ccc57bc146fe050092a858182e5a.jpg"
class="w-40 mt-6"
></div>
<div class="border-r border-gray-300 flex items-center justify-center">

<img
src="https://i.pinimg.com/1200x/1a/5a/a3/1a5aa32a928e548e232b79fb160a3575.jpg"
class="h-[85vh] object-cover"/>
</div>
<div class="p-12 flex flex-col justify-center space-y-8">

<div>
<p class="text-sm tracking-widest mb-4">CHOOSE SIZE</p>

<div class="flex gap-4">

<button class="w-10 h-10 border rounded-full">
S
</button>

<button class="w-10 h-10 border rounded-full bg-black text-white">
M
</button>

<button class="w-10 h-10 border rounded-full">
L
</button>

</div>
</div>
</body>
</html>
